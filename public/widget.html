<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="referrer" content="no-referrer-when-downgrade" />
    <title>Card2pay — Secure checkout</title>
    <link rel="preconnect" href="https://buycoin.online" crossorigin />
    <!-- Runtime widget config (token + options) from environment variables.
         Must load before the widget embed below. -->
    <script src="/api/widget-config"></script>
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        background: #0d0d12;
        color: #e7e7ea;
        font-family: Inter, system-ui, -apple-system, "Segoe UI", Roboto,
          "Helvetica Neue", Arial, sans-serif;
      }
      .wrap {
        padding: 16px;
      }
      .widget-card {
        position: relative;
        min-height: 360px;
        background: #13131a;
        border-radius: 18px;
        padding: 14px;
      }
      #extopWidget {
        width: 100%;
      }
      .loader {
        position: absolute;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 12px;
        color: #6b6b73;
        font-size: 14px;
      }
      .loader.hidden {
        display: none;
      }
      .loader__spinner {
        width: 28px;
        height: 28px;
        border-radius: 50%;
        border: 3px solid rgba(255, 255, 255, 0.12);
        border-top-color: #d69e2e;
        animation: spin 0.9s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }
      .widget-notice {
        margin: 12px 4px 2px;
        padding: 10px 12px;
        border-radius: 10px;
        background: rgba(214, 158, 46, 0.08);
        border: 1px solid rgba(214, 158, 46, 0.3);
        color: #b9842b;
        font-size: 12px;
        line-height: 1.5;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="widget-card">
        <!-- BuyCoin (Extop) exchanger. Parser-inserted <script> so the widget
             can locate its own tag via document.currentScript. -->
        <div id="extopWidget"></div>
        <div id="widgetLoader" class="loader">
          <span class="loader__spinner"></span>
          <span>Loading secure exchange…</span>
        </div>
        <script>
          (function () {
            var c = window.CARD2PAY_CONFIG || {};
            var esc = function (s) {
              return String(s == null ? "" : s).replace(/"/g, "&quot;");
            };
            var tag =
              "<scr" +
              'ipt src="' +
              esc(c.exchangerUrl || "https://buycoin.online/x/calc/exchanger.js") +
              '" data-token="' +
              esc(c.token) +
              '"';
            if (c.currencyFrom)
              tag += ' data-currency-from="' + esc(c.currencyFrom) + '"';
            if (c.currencyTo)
              tag += ' data-currency-to="' + esc(c.currencyTo) + '"';
            tag += ' data-locale="' + esc(c.locale || "en") + '"';
            tag += ' data-layout="' + esc(c.layout || "vertical") + '"';
            if (c.theme) tag += ' data-theme="' + esc(c.theme) + '"';
            tag += "></scr" + "ipt>";
            document.write(tag);
          })();
        </script>
        <p class="widget-notice" role="note">
          Card2pay is <strong>not available to U.S. citizens or residents</strong>.
          By proceeding you confirm you are not a U.S. person.
        </p>
      </div>
    </div>

    <!-- Payment automation (prefill amount + receiver wallet, proceed) -->
    <script src="/app.js"></script>
  </body>
</html>
