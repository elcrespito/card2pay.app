services:
  card2pay:
    build: .
    image: card2pay-app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      # The BuyCoin (Extop) widget data-token. Set this in Coolify env / .env.
      BUYCOIN_WIDGET_TOKEN: ${BUYCOIN_WIDGET_TOKEN}
      BUYCOIN_EXCHANGER_URL: ${BUYCOIN_EXCHANGER_URL:-https://buycoin.online/x/calc/exchanger.js}
      WIDGET_CURRENCY_FROM: ${WIDGET_CURRENCY_FROM:-EUR}
      WIDGET_CURRENCY_TO: ${WIDGET_CURRENCY_TO:-USDT}
      WIDGET_LOCALE: ${WIDGET_LOCALE:-en}
      WIDGET_LAYOUT: ${WIDGET_LAYOUT:-vertical}
      WIDGET_THEME: ${WIDGET_THEME:-light}
      ALLOWED_REFERRER: ${ALLOWED_REFERRER:-peptides}
