services:
  db:
    image: postgres:16-alpine
    container_name: card2pay-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-card2pay}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-card2pay}
    volumes:
      - db-data:/var/lib/postgresql/data
    networks:
      - internal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-card2pay}"]
      interval: 5s
      timeout: 5s
      retries: 10

  app:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: card2pay-app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-card2pay}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-card2pay}?schema=public
      APP_URL: ${APP_URL}
      SESSION_SECRET: ${SESSION_SECRET}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@card2pay.app}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      ADMIN_NAME: ${ADMIN_NAME:-Card2pay Admin}
      REQUIRE_APPROVAL: ${REQUIRE_APPROVAL:-true}
      NOWPAYMENTS_API_KEY: ${NOWPAYMENTS_API_KEY:-}
      NOWPAYMENTS_IPN_SECRET: ${NOWPAYMENTS_IPN_SECRET:-}
      NOWPAYMENTS_PAY_CURRENCY: ${NOWPAYMENTS_PAY_CURRENCY:-usdttrc20}
      NOWPAYMENTS_PRICE_CURRENCY: ${NOWPAYMENTS_PRICE_CURRENCY:-usd}
      NOWPAYMENTS_FIXED_RATE: ${NOWPAYMENTS_FIXED_RATE:-true}
      NOWPAYMENTS_FEE_PAID_BY_USER: ${NOWPAYMENTS_FEE_PAID_BY_USER:-false}
      SANDBOX_MODE: ${SANDBOX_MODE:-true}
      BUYCOIN_WIDGET_TOKEN: ${BUYCOIN_WIDGET_TOKEN:-}
      BUYCOIN_EXCHANGER_URL: ${BUYCOIN_EXCHANGER_URL:-https://buycoin.online/x/calc/exchanger.js}
      WIDGET_CURRENCY_FROM: ${WIDGET_CURRENCY_FROM:-}
      WIDGET_CURRENCY_TO: ${WIDGET_CURRENCY_TO:-}
      WIDGET_LOCALE: ${WIDGET_LOCALE:-en}
      WIDGET_LAYOUT: ${WIDGET_LAYOUT:-vertical}
      WIDGET_THEME: ${WIDGET_THEME:-}
      ALLOWED_REFERRER: ${ALLOWED_REFERRER:-*}
    networks:
      - internal
      - coolify
    labels:
      - traefik.enable=true
      - traefik.docker.network=coolify
      - traefik.http.routers.card2pay-http.entryPoints=http
      - traefik.http.routers.card2pay-http.rule=Host(`${CARD2PAY_HOST}`)
      - traefik.http.routers.card2pay-http.middlewares=card2pay-redirect-https
      - traefik.http.middlewares.card2pay-redirect-https.redirectscheme.scheme=https
      - traefik.http.routers.card2pay-https.entryPoints=https
      - traefik.http.routers.card2pay-https.rule=Host(`${CARD2PAY_HOST}`)
      - traefik.http.routers.card2pay-https.tls=true
      - traefik.http.routers.card2pay-https.tls.certresolver=letsencrypt
      - traefik.http.services.card2pay.loadbalancer.server.port=3000

volumes:
  db-data:

networks:
  internal:
  coolify:
    external: true
